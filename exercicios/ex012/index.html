<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Esse vídeo está sendo hospedado em meu próprio servidor</p>

    <video width="460" poster="imagens/capa-barco.png" controls>
        <source src="midia/Vídeo-Barco.mp4.mp4" type="video/mp4">
        <source src="midia/Vídeo-Barco.webm.webm" type="video/webm">
        <p>Aconteceu algum problema</p>
    </video>

    <h1>Inserindo vídeos do youtube</h1>
    <iframe width="460" height="260" src="https://www.youtube.com/embed/5Hn58p-hYC0" title="Aprenda HTML em apenas 5 MINUTOS (2026)" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>
</html>
