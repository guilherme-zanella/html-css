<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    
    <h1>Output em formulários</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="id_numero1">Número 1: </label>
            <input type="range" name="numero1" id="id_numero1" value="50" oninput="output_num1.value = this.value; output_soma.value = Number(id_numero1.value) + Number(id_numero2.value)">
            <output id="output_num1">50</output>
        </p>
        <p>
            <label for="id_numero2">Número 2:</label>
            <input type="range" name="numero2" id="id_numero2" value="50" oninput="output_num2.value = this.value; output_soma.value = Number(id_numero1.value) + Number(id_numero2.value)">
            <output id="output_num2">50</output>
        </p>
        <p>
            <label for="id_soma">Soma: </label>
            <output id="output_soma">100</output>
        </p>
        <p>
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
