<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url(fontes/Love\ Buble.otf) format(opentype);
            font-weight: normal;
            font-style: normal;
        }
        /* 
        Tipos de format()
        - opentype (otf)
        - truetype (ttf)
        - embedded-opentype 
        - truetype-att (Apple Advanced typo graphy)
        - svg 
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Love', Times, serif;
            font-size: 6em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>TÍTULO</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. A et id dolore itaque, at esse debitis ratione consequuntur natus aliquid assumenda quibusdam praesentium? Sapiente harum nostrum, aut porro quod aliquid?</p>
</body>
</html>
