<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Fonts</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Cookie&display=swap');

        @font-face {
            font-family: 'Love';
            src: url(fontes/Love\ Buble.otf) format(opentype);
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            color: black;
        }

        h1 {
            font: normal normal normal 5em "Love", serif;
        }
        
        h2 {
            font-family: "Cookie", cursive;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Tempore nobis, non similique, quia animi velit quam neque fugiat unde magni nostrum quisquam eaque ullam officiis assumenda repellendus cumque harum at.</p>
    <h2>Exemplo de subtítulo</h2>
</body>
</html>
