<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>Você pode escrever um 
        parágrafo de qualquer jeito
        basta colocar
        tudo entre &lt;p&gt; e &lt;/p&gt;<!--less than / greather than-->
    </p>
    <p>Se você quer quebrar <br>de linha é sóutilizar a tag &lt;br&gt;. </p>
    <p>Vamos adicionar alguns símbolos especiais: <br>
        &reg;
        &copy;
        &trade;
        &euro;
        &dollar;
        &pound;
        &real;
        &yen;
        &Delta;
        &uparrow;
        &uarr;
        &LeftArrow;
        &RightArrow;
    </p>
    <p>Vamos adicionar alguns emojis: <br>
        &#x1F6B5;
        &#x1F600;
        &#x1F431;
    </p>
</body>
</html>
